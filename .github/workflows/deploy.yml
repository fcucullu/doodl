name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if Supabase is configured
        id: check
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: supabase/setup-cli@v1
        if: steps.check.outputs.skip != 'true'
        with:
          version: latest

      - name: Link Supabase project
        if: steps.check.outputs.skip != 'true'
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}

      - name: Sync migration placeholders
        if: steps.check.outputs.skip != 'true'
        shell: bash
        run: |
          set +e
          OUTPUT=$(supabase migration list 2>&1)
          set -e
          REMOTE_VERSIONS=$(echo "$OUTPUT" | awk '/^   [0-9]/{print $1}' | sort -u)
          for v in $REMOTE_VERSIONS; do
            if ! ls supabase/migrations/${v}* 2>/dev/null | grep -q .; then
              touch "supabase/migrations/${v}_.sql"
              echo "Created placeholder for migration $v"
            fi
          done

      - name: Push database migrations
        if: steps.check.outputs.skip != 'true'
        run: supabase db push --include-all

  deploy:
    runs-on: ubuntu-latest
    needs: migrate
    if: always() && (needs.migrate.result == 'success' || needs.migrate.result == 'skipped')
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        run: |
          URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "Deployed to: $URL"

      - name: Add custom domain
        run: |
          SUBDOMAIN="${{ secrets.APP_SUBDOMAIN }}"
          DOMAIN="${{ secrets.CLOUDFLARE_DOMAIN }}"
          FULL_DOMAIN="${SUBDOMAIN}.${DOMAIN}"
          curl -s -X POST "https://api.vercel.com/v10/projects/${VERCEL_PROJECT_ID}/domains" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"${FULL_DOMAIN}\"}" || true

  dns:
    runs-on: ubuntu-latest
    needs: deploy
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
    steps:
      - name: Set Cloudflare CNAME
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ZONE_ID" ]; then
            echo "Cloudflare not configured, skipping DNS"
            exit 0
          fi
          SUBDOMAIN="${{ secrets.APP_SUBDOMAIN }}"
          DOMAIN="${{ secrets.CLOUDFLARE_DOMAIN }}"
          FULL_DOMAIN="${SUBDOMAIN}.${DOMAIN}"
          EXISTING=$(curl -s -X GET \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/dns_records?type=CNAME&name=${FULL_DOMAIN}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" | jq -r '.result[0].id // empty')
          if [ -n "$EXISTING" ]; then
            curl -s -X PUT \
              "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/dns_records/${EXISTING}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"CNAME\",\"name\":\"${SUBDOMAIN}\",\"content\":\"cname.vercel-dns.com\",\"proxied\":false}"
          else
            curl -s -X POST \
              "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}/dns_records" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "{\"type\":\"CNAME\",\"name\":\"${SUBDOMAIN}\",\"content\":\"cname.vercel-dns.com\",\"proxied\":false}"
          fi
